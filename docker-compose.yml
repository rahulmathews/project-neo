services:
  workers:
    build:
      context: ./apps/workers
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      - DATABASE_URL=${DATABASE_URL}
    networks:
      - neo-network
    restart: unless-stopped

  graphql-api:
    build:
      context: ./apps/graphql-api
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
    networks:
      - neo-network
    restart: unless-stopped

networks:
  neo-network:
    driver: bridge
