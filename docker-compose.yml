name: neo

services:
  workers:
    container_name: workers_neo
    build:
      context: .
      dockerfile: apps/workers/Dockerfile
    ports:
      - "8083:8083"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://localhost:11434/v1}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5:3b}
      - OLLAMA_API_KEY=${OLLAMA_API_KEY}
      - WHATSAPP_SESSION_PATH=/data/whatsapp.db
    volumes:
      - whatsapp-session:/data
    networks:
      - neo-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/workers", "healthcheck"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  graphql-api:
    container_name: graphql_api_neo
    build:
      context: .
      dockerfile: apps/graphql-api/Dockerfile
    ports:
      - "8082:8082"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
      - PORT=8082
    networks:
      - neo-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/graphql-api", "healthcheck"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  neo-network:
    driver: bridge

volumes:
  whatsapp-session:
