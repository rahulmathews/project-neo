services:
  workers:
    build:
      context: .
      dockerfile: apps/workers/Dockerfile
    ports:
      - "8083:8083"
    environment:
      - DATABASE_URL=${DATABASE_URL}
    networks:
      - neo-network
    restart: unless-stopped

  graphql-api:
    build:
      context: .
      dockerfile: apps/graphql-api/Dockerfile
    ports:
      - "8082:8080"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
    networks:
      - neo-network
    restart: unless-stopped

networks:
  neo-network:
    driver: bridge
