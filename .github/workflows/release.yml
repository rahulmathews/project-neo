name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Create Release Pull Request
        id: changesets
        uses: changesets/action@v1
        with:
          version: bun run version-packages
          commit: 'chore(release): version packages'
          title: 'chore(release): version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Runs only when the Version PR (chore(release): version packages) is merged.
      # `bun run release` = `changeset tag` (creates local git tags, no npm publish).
      # `--prerelease` matches the alpha channel. Remove this flag when running
      # `changeset pre exit` to switch to stable releases.
      - name: Tag and create GitHub Releases
        if: >
          github.event_name == 'push' &&
          steps.changesets.outputs.hasChangesets == 'false' &&
          startsWith(github.event.head_commit.message, 'chore(release):')
        run: |
          bun run release
          git push --follow-tags
          for tag in $(git tag --points-at HEAD); do
            gh release create "$tag" \
              --title "$tag" \
              --generate-notes \
              --prerelease
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
