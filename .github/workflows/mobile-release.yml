name: Mobile Release

on:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    name: Build Android APK
    runs-on: ubuntu-latest
    environment: runner-env
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: apps/mobile
        run: flutter pub get

      - name: Build release APK
        working-directory: apps/mobile
        run: |
          flutter build apk --release \
            --dart-define=SUPABASE_URL="${{ secrets.SUPABASE_URL }}" \
            --dart-define=SUPABASE_ANON_KEY="${{ secrets.SUPABASE_ANON_KEY }}" \
            --dart-define=GRAPHQL_API_URL="${{ secrets.GRAPHQL_API_URL }}" \
            --dart-define=GRAPHQL_WS_URL="${{ secrets.GRAPHQL_WS_URL }}"

      - name: Upload APK to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.event.release.tag_name }} \
            apps/mobile/build/app/outputs/flutter-apk/app-release.apk \
            --clobber

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: apps/mobile/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

  ios:
    name: Build iOS IPA
    runs-on: macos-latest
    environment: runner-env
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: apps/mobile
        run: flutter pub get

      - name: Build IPA (no codesign)
        working-directory: apps/mobile
        run: |
          flutter build ipa --no-codesign \
            --dart-define=SUPABASE_URL="${{ secrets.SUPABASE_URL }}" \
            --dart-define=SUPABASE_ANON_KEY="${{ secrets.SUPABASE_ANON_KEY }}" \
            --dart-define=GRAPHQL_API_URL="${{ secrets.GRAPHQL_API_URL }}" \
            --dart-define=GRAPHQL_WS_URL="${{ secrets.GRAPHQL_WS_URL }}"

      - name: Upload IPA to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.event.release.tag_name }} \
            apps/mobile/build/ios/ipa/*.ipa \
            --clobber

      - name: Upload IPA as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: apps/mobile/build/ios/ipa/*.ipa
          retention-days: 30
