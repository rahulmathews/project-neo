name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    name: Lint, Format & Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Cache Turborepo
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'apps/graphql-api/go.mod'
          cache: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.4'
          channel: stable
          cache: true

      - name: Install JS/TS dependencies
        run: bun install --frozen-lockfile

      - name: Install Go dependencies
        run: |
          if [ -f go.work ]; then
            go work sync
          fi

      - name: Install Go tools
        run: |
          go install mvdan.cc/gofumpt@v0.8.0
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@v2.2.2

      - name: Install Flutter dependencies
        working-directory: apps/mobile
        run: flutter pub get

      - name: Check formatting
        run: bun run format:check

      - name: Flutter — check formatting
        working-directory: apps/mobile
        run: dart format --output=none --set-exit-if-changed lib/

      - name: Lint code
        run: bun run lint

      - name: Flutter — analyze (lint & type-check)
        working-directory: apps/mobile
        run: flutter analyze

      - name: Build all packages
        run: |
          if [ -n "$(find apps packages -maxdepth 1 -type d ! -path apps ! -path packages 2>/dev/null)" ]; then
            bun run build
          else
            echo "Skipping build: no packages exist yet"
          fi
