schema:
  - graph/*.graphqls

exec:
  filename: graph/generated/generated.go
  package: generated

model:
  filename: graph/model/models_gen.go
  package: model

resolver:
  layout: follow-schema
  dir: graph/resolvers
  package: resolvers
  filename_template: "{name}.resolvers.go"

autobind:
  - "project-neo/shared/model"

models:
  # Scalars
  UUID:
    model:
      - github.com/99designs/gqlgen/graphql.UUID
  Time:
    model:
      - github.com/99designs/gqlgen/graphql.Time
  # Enums — explicitly bind to internal/model to avoid duplicate generation
  UserRole:
    model: project-neo/shared/model.UserRole
  RideType:
    model: project-neo/shared/model.RideType
  RideStatus:
    model: project-neo/shared/model.RideStatus
  MatchStatus:
    model: project-neo/shared/model.MatchStatus
  # Input types — explicitly bind to internal/model (autobind does not cover inputs)
  UpsertUserInput:
    model: project-neo/shared/model.UpsertUserInput
  CreateRideInput:
    model: project-neo/shared/model.CreateRideInput
  UpdateRideInput:
    model: project-neo/shared/model.UpdateRideInput
  CreateGroupInput:
    model: project-neo/shared/model.CreateGroupInput
  UpsertLocationContextInput:
    model: project-neo/shared/model.UpsertLocationContextInput
  # Relationship fields — lazy-loaded via resolver methods
  Ride:
    fields:
      group:
        resolver: true
      postedBy:
        resolver: true
      fromLocationContext:
        resolver: true
      toLocationContext:
        resolver: true
  Group:
    fields:
      locationContexts:
        resolver: true
  LocationContext:
    fields:
      group:
        resolver: true
      location:
        resolver: true
  Match:
    fields:
      ride:
        resolver: true
      rider:
        resolver: true
      driver:
        resolver: true
