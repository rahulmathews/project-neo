name: mobile
description: Project Neo mobile app
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^14.0.0
  supabase_flutter: ^2.5.0
  graphql_flutter: ^5.2.0
  google_fonts: ^6.0.0

dev_dependencies:
  flutter_lints: ^5.0.0
  riverpod_generator: ^2.6.5
  build_runner: ^2.4.0

flutter:
  uses-material-design: true
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
    - family: InterTight
      fonts:
        - asset: assets/fonts/InterTight-Variable.ttf
          weight: 600
        - asset: assets/fonts/InterTight-Variable.ttf
          weight: 700
